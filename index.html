<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>신라이언 러닝 게임</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#64B5F6;touch-action:none}
canvas{display:block;margin:0 auto}
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
// ============================================================
// 신라이언 러닝 게임 — 최종 버전
// 정면 직진 원근 트랙, 기획서 요구사항 전체 반영
// ============================================================
const C=document.getElementById('game'),X=C.getContext('2d');
function resize(){const r=720/1280;let w=window.innerWidth,h=window.innerHeight;if(w/h>r)w=h*r;else h=w/r;C.width=720;C.height=1280;C.style.width=w+'px';C.style.height=h+'px';}
resize();window.addEventListener('resize',resize);

// ── 상수 ────────────────────────────
const LANES=5, GAME_SEC=120, TRAP_DMG=10, BREAD_HEAL=5;
const INVINCE=1000, BOOST_DUR=4000, BOOST_INT=20000, BOOST_SPD=1.6;
// 정면 직진 트랙
const VPX=360, VPY=320, BX=360, BY=1100, TW_NEAR=550, TW_FAR=60;

// 난이도 (초반부터 함정 나옴)
function diff(t){
  if(t<20) return{s:1.0,tr:0.020,it:0.012};
  if(t<50) return{s:1.2,tr:0.028,it:0.009};
  if(t<80) return{s:1.35,tr:0.035,it:0.007};
  return{s:1.5,tr:0.042,it:0.006};
}

// ── 상태 ────────────────────────────
let state='menu',nrg=100,score=0,dst=0,elp=0;
let cmb=0,maxCmb=0,items=0,tgtL=2,lnSm=2;
let invU=0,bstU=0,lastBst=0,spdM=1,shk=0;
let obs=[],pts=[],trkOff=0,lt=0;
let cTxt='',cTmr=0;
let fall=null; // 추락 상태
let camZoom=1; // 부스터 줌
let endChar=null; // 종료 캐릭터 연출

const BREAD_NAMES=['앙버터','휘낭시에','소금빵'];
const WIN_MSG=["끝까지 포기하지 않으면 반드시 도착할 수 있어!","꾸준히 나아가면 결국 목표에 닿는다!","한 걸음씩, 멈추지 않는 것이 가장 빠른 길!"];
const LOSE_MSG=["조금 쉬어가도 괜찮아, 다시 도전해보자!","이번엔 여기까지, 다음엔 더 멀리 갈 수 있어!","실패는 끝이 아니라 과정이야!","다시 달리면 더 강해질 수 있어!"];

// ── 좌표 변환 ──────────────────────
function toScr(lane,depth){
  const t=Math.max(0,Math.min(1,depth));
  const cx=BX+(VPX-BX)*t, cy=BY+(VPY-BY)*t;
  const tw=TW_NEAR+(TW_FAR-TW_NEAR)*t;
  const off=(lane-2)/2*tw*0.42;
  return{x:cx+off,y:cy,sc:1-t*0.8,tw};
}

// ── 입력 ────────────────────────────
let tx=0;
document.addEventListener('keydown',e=>{
  if(state==='menu'){start();return}
  if(state!=='playing'){state='menu';return}
  if(e.key==='ArrowLeft'||e.key==='a')mv(-1);
  if(e.key==='ArrowRight'||e.key==='d')mv(1);
});
C.addEventListener('touchstart',e=>{e.preventDefault();if(state==='menu'){start();return}if(state!=='playing'){state='menu';return}tx=e.touches[0].clientX;});
C.addEventListener('touchend',e=>{e.preventDefault();if(state!=='playing')return;const dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>25)mv(dx>0?1:-1);});
C.addEventListener('mousedown',e=>{if(state==='menu'){start();return}if(state!=='playing'){state='menu';return}const r=C.getBoundingClientRect();const x=(e.clientX-r.left)/r.width*720;x<360?mv(-1):mv(1);});
function mv(d){tgtL=Math.max(0,Math.min(LANES-1,tgtL+d));}

function start(){
  state='playing';nrg=100;score=0;dst=0;elp=0;
  cmb=0;maxCmb=0;items=0;tgtL=2;lnSm=2;
  invU=0;bstU=0;lastBst=0;spdM=1;shk=0;
  obs=[];pts=[];fall=null;camZoom=1;endChar=null;
  lt=performance.now();
}

// ── 생성 (간격 보장) ────────────────
function spawn(type){
  const same=obs.filter(o=>o.type===type&&o.depth>0.82);
  if(type==='trap'&&same.length>=2) return;
  if(type==='item'&&same.length>=1) return;
  const usedL=obs.filter(o=>o.type==='trap'&&o.depth>0.8).map(o=>o.lane);
  if(type==='trap'&&usedL.length>=3) return;
  let lane,att=0;
  do{lane=Math.floor(Math.random()*LANES);att++;}while(type==='trap'&&usedL.includes(lane)&&att<10);
  const sparkle=type==='item'&&Math.random()<0.12;
  const breadType=Math.floor(Math.random()*3);
  obs.push({type,lane,depth:1.15,sparkle,hit:false,breadType});
}

function addP(x,y,c,n=5){for(let i=0;i<n;i++)pts.push({x,y,vx:(Math.random()-.5)*8,vy:-Math.random()*5-2,life:1,color:c,sz:3+Math.random()*5});}

function startFall(){fall={t:0,ph:'fall',dur:1.2};shk=15;}
function boost(now){bstU=now+BOOST_DUR;lastBst=now;addP(360,800,'#FFD700',20);}

// ── 업데이트 ────────────────────────
function update(dt){
  if(state!=='playing')return;
  const now=performance.now();

  // 부스터 줌 보간
  const targetZoom=now<bstU?1.08:1.0;
  camZoom+=(targetZoom-camZoom)*0.05;

  // 추락 중
  if(fall){
    fall.t+=dt;
    if(fall.ph==='fall'&&fall.t>0.3)fall.ph='recover';
    if(fall.t>fall.dur)fall=null;
    shk*=0.9;return;
  }

  elp+=dt;
  const d=diff(elp);
  if(now<bstU)spdM=BOOST_SPD;else{spdM=d.s;if(now-lastBst>BOOST_INT&&elp>5)boost(now);}
  const spd=3*spdM;
  lnSm+=(tgtL-lnSm)*0.12;
  dst+=spd*dt*10;
  score+=Math.floor(spd*dt*5);
  trkOff=(trkOff+spd*dt*60)%100;

  if(Math.random()<d.tr)spawn('trap');
  if(Math.random()<d.it)spawn('item');

  for(let i=obs.length-1;i>=0;i--){
    const o=obs[i];
    o.depth-=spd*dt*0.012;
    if(o.depth<0.08&&o.depth>-0.02&&!o.hit){
      if(Math.abs(o.lane-Math.round(lnSm))<0.6){
        o.hit=true;
        const p=toScr(o.lane,Math.max(0,o.depth));
        if(o.type==='trap'){
          if(now>invU){
            nrg=Math.max(0,nrg-TRAP_DMG);invU=now+INVINCE;cmb=0;
            addP(p.x,p.y,'#FF4444',12);startFall();
            if(nrg<=0){endChar='lose';state='gameover';return;}
          }
        }else{
          nrg=Math.min(100,nrg+BREAD_HEAL);items++;cmb++;
          if(cmb>maxCmb)maxCmb=cmb;
          score+=50*cmb;
          if(o.sparkle){boost(now);addP(p.x,p.y,'#FFD700',18);}
          else addP(p.x,p.y,'#FF9800',8);
          if(cmb>=20){cTxt='🔥 AWESOME!';cTmr=1.5;}
          else if(cmb>=10){cTxt='⭐ GREAT!';cTmr=1.2;}
          else if(cmb>=5){cTxt='👍 NICE!';cTmr=1;}
        }
      }
    }
    if(o.depth<-0.15){if(o.type==='trap'&&!o.hit){cmb++;score+=10;}obs.splice(i,1);}
  }

  for(let i=pts.length-1;i>=0;i--){const p=pts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.2;p.life-=dt*2.5;if(p.life<=0)pts.splice(i,1);}
  shk*=0.9;if(shk<0.1)shk=0;
  if(cTmr>0)cTmr-=dt;
  if(elp>=GAME_SEC){endChar='win';state='victory';}
}

// ── 그리기 ──────────────────────────
function draw(){
  const now=performance.now(),bst=now<bstU,inv=now<invU;
  X.save();
  // 카메라 줌 (부스터)
  if(camZoom!==1){
    X.translate(360,700);X.scale(camZoom,camZoom);X.translate(-360,-700);
  }
  if(shk>0)X.translate((Math.random()-.5)*shk*2,(Math.random()-.5)*shk*2);

  // 하늘
  const sky=X.createLinearGradient(0,0,0,VPY+80);
  sky.addColorStop(0,bst?'#FF6F00':'#42A5F5');
  sky.addColorStop(0.6,bst?'#FFB74D':'#90CAF9');
  sky.addColorStop(1,bst?'#FFE0B2':'#C8E6C9');
  X.fillStyle=sky;X.fillRect(0,0,720,VPY+80);

  // 구름
  X.fillStyle='rgba(255,255,255,0.6)';
  const ct=now/4000;
  [[100+ct*20%720,VPY-60,70,22],[350+ct*15%720,VPY-90,90,25],[600+ct*25%720,VPY-40,60,18]].forEach(([cx,cy,w,h])=>{
    X.beginPath();X.ellipse(cx%720,cy,w,h,0,0,Math.PI*2);X.fill();
  });

  // 잔디
  const gr=X.createLinearGradient(0,VPY+30,0,1280);
  gr.addColorStop(0,'#43A047');gr.addColorStop(0.5,'#388E3C');gr.addColorStop(1,'#2E7D32');
  X.fillStyle=gr;X.fillRect(0,VPY+30,720,1280);

  drawBG(bst);
  drawTrack(bst);

  // 장애물 (뒤→앞)
  [...obs].sort((a,b)=>b.depth-a.depth).forEach(o=>{if(o.depth>-0.05&&o.depth<1.1)drawOb(o);});

  // 캐릭터
  if(fall&&fall.ph==='fall'){
    const ft=fall.t/0.3,p=toScr(lnSm,0.05);
    X.save();X.translate(p.x,p.y+ft*80);X.scale(1-ft*.5,1-ft*.5);X.globalAlpha=1-ft;
    drawBody(false,false,'hurt');X.restore();
  }else if(fall&&fall.ph==='recover'){
    const rt=(fall.t-0.3)/(fall.dur-0.3),p=toScr(lnSm,0.05);
    X.save();X.translate(p.x,p.y-100*(1-rt));X.globalAlpha=Math.min(1,rt*2);
    X.scale(.5+rt*.5,.5+rt*.5);drawBody(false,false,'normal');X.restore();
  }else{
    drawChar(bst,inv);
  }

  if(bst)drawSpeedLines();

  for(const p of pts){X.globalAlpha=p.life;X.fillStyle=p.color;X.beginPath();X.arc(p.x,p.y,p.sz,0,Math.PI*2);X.fill();}
  X.globalAlpha=1;
  X.restore();

  drawUI();
  if(cTmr>0){X.save();X.globalAlpha=Math.min(1,cTmr);X.font='bold 52px sans-serif';X.fillStyle='#FFD700';X.strokeStyle='#5D4037';X.lineWidth=4;X.textAlign='center';X.strokeText(cTxt,360,500);X.fillText(cTxt,360,500);X.restore();}
}

// ── 배경 ────────────────────────────
function drawBG(bst){
  // 산
  X.fillStyle='#81C784';
  X.beginPath();X.moveTo(0,VPY+10);X.quadraticCurveTo(180,VPY-50,360,VPY);X.quadraticCurveTo(540,VPY-30,720,VPY+20);X.lineTo(720,VPY+60);X.lineTo(0,VPY+60);X.fill();

  // 빵집 (왼쪽)
  X.fillStyle='#FFCC80';X.fillRect(15,VPY-40,75,65);
  X.fillStyle='#8D6E63';X.beginPath();X.moveTo(5,VPY-40);X.lineTo(52,VPY-80);X.lineTo(100,VPY-40);X.fill();
  X.fillStyle='#FFF9C4';X.fillRect(28,VPY-25,18,16);X.fillRect(58,VPY-25,18,16);
  X.fillStyle='#5D4037';X.fillRect(25,VPY+2,55,18);
  X.font='bold 9px sans-serif';X.fillStyle='#FFF';X.textAlign='center';X.fillText('🍞 빵집',52,VPY+14);
  X.fillStyle='#6D4C41';X.fillRect(42,VPY+5,20,18);

  // 집 (오른쪽)
  X.fillStyle='#ECEFF1';X.fillRect(630,VPY-20,65,45);
  X.fillStyle='#78909C';X.beginPath();X.moveTo(625,VPY-20);X.lineTo(662,VPY-50);X.lineTo(700,VPY-20);X.fill();
  X.fillStyle='#BBDEFB';X.fillRect(640,VPY-8,14,14);X.fillRect(665,VPY-8,14,14);

  // 벚꽃 나무 (트랙 양쪽, 원근감)
  const trees=[
    {x:30,y:VPY+50,s:.5},{x:690,y:VPY+40,s:.45},
    {x:15,y:VPY+160,s:.8},{x:705,y:VPY+140,s:.7},
    {x:5,y:VPY+320,s:1.1},{x:715,y:VPY+290,s:1.0},
    {x:-5,y:VPY+500,s:1.4},{x:725,y:VPY+470,s:1.3},
  ];
  for(const t of trees){
    X.fillStyle='#5D4037';X.fillRect(t.x-3*t.s,t.y,6*t.s,35*t.s);
    X.fillStyle='#F48FB1';X.beginPath();X.arc(t.x,t.y-12*t.s,20*t.s,0,Math.PI*2);X.fill();
    X.fillStyle='#F8BBD0';
    X.beginPath();X.arc(t.x-9*t.s,t.y-4*t.s,13*t.s,0,Math.PI*2);X.fill();
    X.beginPath();X.arc(t.x+9*t.s,t.y-4*t.s,13*t.s,0,Math.PI*2);X.fill();
    X.fillStyle='#FCE4EC';
    X.beginPath();X.arc(t.x-4*t.s,t.y-16*t.s,5*t.s,0,Math.PI*2);X.fill();
  }

  // 꽃잎
  const now=performance.now()/1000;
  X.fillStyle='rgba(248,187,208,0.5)';
  for(let i=0;i<10;i++){
    const px=(i*89+now*25)%720,py=(i*127+now*35+Math.sin(now*2+i)*25)%700+VPY-50;
    X.beginPath();X.ellipse(px,py,3,2,now+i,0,Math.PI*2);X.fill();
  }

  // 앞쪽 언덕
  X.fillStyle='#66BB6A';
  X.beginPath();X.moveTo(0,VPY+80);X.quadraticCurveTo(200,VPY+50,400,VPY+75);X.quadraticCurveTo(600,VPY+45,720,VPY+85);X.lineTo(720,VPY+110);X.lineTo(0,VPY+110);X.fill();
}

// ── 트랙 ────────────────────────────
function drawTrack(bst){
  const steps=50;
  for(let i=0;i<steps;i++){
    const d1=i/steps,d2=(i+1)/steps;
    const p1=toScr(2,d1),p2=toScr(2,d2);
    const w1=p1.tw*.5,w2=p2.tw*.5;

    // 트랙 바닥 (줄무늬로 이동감)
    const stripe=((i*2+Math.floor(trkOff/5))%4<2);
    X.fillStyle=bst?(stripe?'#A07030':'#8B6020'):(stripe?'#9E8E72':'#8B7B5F');
    X.beginPath();
    X.moveTo(p1.x-w1,p1.y);X.lineTo(p2.x-w2,p2.y);
    X.lineTo(p2.x+w2,p2.y);X.lineTo(p1.x+w1,p1.y);X.fill();

    // 레인 구분
    if(i%3===0){
      X.strokeStyle='rgba(255,255,255,0.15)';X.lineWidth=Math.max(0.5,1-d1);
      for(let l=1;l<LANES;l++){
        const off1=(l-2)/2*.84*w1,off2=(l-2)/2*.84*w2;
        X.beginPath();X.moveTo(p1.x+off1,p1.y);X.lineTo(p2.x+off2,p2.y);X.stroke();
      }
    }
  }

  // 테두리
  X.strokeStyle='#5D4037';X.lineWidth=3;
  const nL=toScr(0,0),fL=toScr(0,1),nR=toScr(4,0),fR=toScr(4,1);
  X.beginPath();X.moveTo(nL.x-nL.tw*.21,nL.y);X.lineTo(fL.x-fL.tw*.21,fL.y);X.stroke();
  X.beginPath();X.moveTo(nR.x+nR.tw*.21,nR.y);X.lineTo(fR.x+fR.tw*.21,fR.y);X.stroke();
}

// ── 장애물 ──────────────────────────
function drawOb(o){
  const p=toScr(o.lane,o.depth),s=p.sc*1.3;
  if(s<.05)return;
  X.save();X.translate(p.x,p.y);X.scale(s,s);

  if(o.type==='trap'){
    // 함정: 뾰족 바위 + 빨간 글로우
    X.fillStyle='rgba(255,50,50,0.15)';X.beginPath();X.arc(0,0,35,0,Math.PI*2);X.fill();
    X.fillStyle='#555';X.beginPath();X.moveTo(-22,8);X.lineTo(-10,-28);X.lineTo(2,8);X.fill();
    X.fillStyle='#777';X.beginPath();X.moveTo(-4,8);X.lineTo(10,-22);X.lineTo(22,8);X.fill();
    X.fillStyle='#666';X.beginPath();X.moveTo(4,8);X.lineTo(-2,-32);X.lineTo(-10,8);X.fill();
    // 빨간 X 마크
    X.strokeStyle='#FF2222';X.lineWidth=3;
    X.beginPath();X.moveTo(-10,-35);X.lineTo(10,-20);X.moveTo(10,-35);X.lineTo(-10,-20);X.stroke();
  }else{
    if(o.sparkle){
      // ⭐ 빤짝이 빵
      const t=performance.now()/250;
      const glow=X.createRadialGradient(0,-8,3,0,-8,40);
      glow.addColorStop(0,'rgba(255,215,0,0.6)');glow.addColorStop(1,'rgba(255,215,0,0)');
      X.fillStyle=glow;X.beginPath();X.arc(0,-8,40,0,Math.PI*2);X.fill();
      X.save();X.rotate(t);X.font='40px sans-serif';X.textAlign='center';X.textBaseline='middle';
      X.fillText('⭐',0,-8);X.restore();
      X.font='bold 10px sans-serif';X.fillStyle='#FFD700';X.textAlign='center';
      X.fillText('BOOST!',0,22);
    }else{
      // 일반 빵 (종류별 색상)
      const colors=[['#D4A054','#EDBE76','#F5D89A'],['#C68642','#DDA15E','#E8C07A'],['#E8B866','#F0CC80','#F5DCA0']];
      const cl=colors[o.breadType||0];
      X.fillStyle='rgba(0,0,0,0.12)';X.beginPath();X.ellipse(0,10,24,7,0,0,Math.PI*2);X.fill();
      X.fillStyle=cl[0];X.beginPath();X.ellipse(0,0,24,17,0,0,Math.PI*2);X.fill();
      X.fillStyle=cl[1];X.beginPath();X.ellipse(0,-4,19,13,0,0,Math.PI*2);X.fill();
      X.fillStyle=cl[2];X.beginPath();X.ellipse(-5,-9,8,6,0,0,Math.PI*2);X.fill();
      X.strokeStyle=cl[0];X.lineWidth=1.5;
      X.beginPath();X.moveTo(-12,-2);X.quadraticCurveTo(0,-12,12,-2);X.stroke();
      // 이름 + 회복량
      X.font='bold 10px sans-serif';X.fillStyle='#4CAF50';X.textAlign='center';
      X.fillText('+5 '+BREAD_NAMES[o.breadType||0],0,28);
    }
  }
  X.restore();
}

// ── 캐릭터 ──────────────────────────
function drawChar(bst,inv){
  const now=performance.now();
  if(inv&&Math.floor(now/80)%3===0)return;
  const p=toScr(lnSm,0.05);
  X.save();X.translate(p.x,p.y-30);
  X.rotate((tgtL-lnSm)*0.1);
  drawBody(bst,true,'normal');
  X.restore();
}

function drawBody(bst,anim,mood){
  const now=performance.now();
  const run=anim?Math.sin(now/(bst?60:100))*10:0; // 부스터 시 더 빠른 다리
  const arm=anim?Math.sin(now/(bst?60:100))*20:0;

  // 그림자
  X.fillStyle='rgba(0,0,0,0.15)';X.beginPath();X.ellipse(0,42,28,8,0,0,Math.PI*2);X.fill();

  // 다리
  X.fillStyle='#C49040';
  X.fillRect(-13,22+run,11,20);X.fillRect(2,22-run,11,20);
  // 신발
  X.fillStyle='#E53935';
  X.fillRect(-15,40+run,15,5);X.fillRect(0,40-run,15,5);

  // 몸통
  X.fillStyle='#E8B866';X.beginPath();X.ellipse(0,5,30,27,0,0,Math.PI*2);X.fill();
  X.fillStyle='#F5DEB3';X.beginPath();X.ellipse(0,10,20,18,0,0,Math.PI*2);X.fill();

  // 팔
  X.fillStyle='#D4A054';
  if(bst){
    // 부스터: 팔 뒤로 쭉
    X.save();X.rotate(0.3);X.fillRect(-35,-2,16,8);X.restore();
    X.save();X.rotate(-0.3);X.fillRect(19,-2,16,8);X.restore();
  }else{
    X.save();X.translate(-27,2);X.rotate(arm*Math.PI/180);X.fillRect(0,-4,12,16);X.restore();
    X.save();X.translate(15,2);X.rotate(-arm*Math.PI/180);X.fillRect(0,-4,12,16);X.restore();
  }

  // 머리
  X.fillStyle='#E8B866';X.beginPath();X.arc(0,-22,24,0,Math.PI*2);X.fill();
  // 갈기
  X.fillStyle='#D4A054';X.beginPath();X.arc(0,-24,28,Math.PI*.75,Math.PI*2.25);X.fill();
  // 귀
  X.fillStyle='#D4A054';X.beginPath();X.arc(-17,-40,9,0,Math.PI*2);X.fill();X.beginPath();X.arc(17,-40,9,0,Math.PI*2);X.fill();
  X.fillStyle='#FFB7C5';X.beginPath();X.arc(-17,-40,5,0,Math.PI*2);X.fill();X.beginPath();X.arc(17,-40,5,0,Math.PI*2);X.fill();

  // 눈
  if(mood==='hurt'){
    // X눈
    X.strokeStyle='#333';X.lineWidth=2;
    X.beginPath();X.moveTo(-12,-27);X.lineTo(-4,-21);X.moveTo(-4,-27);X.lineTo(-12,-21);X.stroke();
    X.beginPath();X.moveTo(4,-27);X.lineTo(12,-21);X.moveTo(12,-27);X.lineTo(4,-21);X.stroke();
  }else if(mood==='win'){
    // ^^ 눈
    X.strokeStyle='#333';X.lineWidth=2.5;
    X.beginPath();X.arc(-8,-24,5,Math.PI,0);X.stroke();
    X.beginPath();X.arc(8,-24,5,Math.PI,0);X.stroke();
  }else{
    X.fillStyle='#333';X.beginPath();X.arc(-8,-24,5,0,Math.PI*2);X.fill();X.beginPath();X.arc(8,-24,5,0,Math.PI*2);X.fill();
    X.fillStyle='#FFF';X.beginPath();X.arc(-6,-26,2.5,0,Math.PI*2);X.fill();X.beginPath();X.arc(10,-26,2.5,0,Math.PI*2);X.fill();
  }

  // 코
  X.fillStyle='#444';X.beginPath();X.ellipse(0,-17,5,3.5,0,0,Math.PI*2);X.fill();

  // 입
  X.strokeStyle='#444';X.lineWidth=2;X.beginPath();
  if(mood==='win'){X.arc(0,-12,7,0,Math.PI);}
  else if(mood==='hurt'){X.arc(0,-10,5,Math.PI,0);}
  else if(bst){X.arc(0,-13,7,0,Math.PI);}
  else{X.arc(0,-15,4,.1,Math.PI-.1);}
  X.stroke();

  // 볼
  X.fillStyle='rgba(255,150,150,0.4)';
  X.beginPath();X.arc(-15,-17,6,0,Math.PI*2);X.fill();
  X.beginPath();X.arc(15,-17,6,0,Math.PI*2);X.fill();

  // 부스터 이펙트: 뒤에 불꽃
  if(bst&&anim){
    X.fillStyle='rgba(255,100,0,0.5)';
    X.beginPath();X.moveTo(-8,42);X.lineTo(0,55+Math.random()*10);X.lineTo(8,42);X.fill();
    X.fillStyle='rgba(255,200,0,0.5)';
    X.beginPath();X.moveTo(-4,42);X.lineTo(0,50+Math.random()*8);X.lineTo(4,42);X.fill();
  }
}

// ── 속도선 ──────────────────────────
function drawSpeedLines(){
  X.strokeStyle='rgba(255,200,0,0.3)';X.lineWidth=2;
  for(let i=0;i<12;i++){
    const x=60+Math.random()*600,y=350+Math.random()*650;
    X.beginPath();X.moveTo(x,y);X.lineTo(x,y+60+Math.random()*40);X.stroke();
  }
}

// ── UI ──────────────────────────────
function drawUI(){
  if(state!=='playing')return;

  X.fillStyle='rgba(0,0,0,0.55)';X.fillRect(0,0,720,105);
  X.fillStyle='rgba(139,105,20,0.3)';X.fillRect(0,103,720,3);

  // 에너지바
  X.fillStyle='#222';X.fillRect(20,18,300,28);
  const ec=nrg>50?'#4CAF50':nrg>25?'#FF9800':'#F44336';
  X.fillStyle=ec;X.fillRect(22,20,296*(nrg/100),24);
  // 에너지바 광택
  X.fillStyle='rgba(255,255,255,0.15)';X.fillRect(22,20,296*(nrg/100),10);
  X.strokeStyle='#444';X.lineWidth=2;X.strokeRect(20,18,300,28);
  X.font='bold 15px sans-serif';X.fillStyle='#FFF';X.textAlign='center';
  X.fillText(`에너지 ${Math.ceil(nrg)}%`,170,38);

  // 점수/거리
  X.font='bold 22px sans-serif';X.fillStyle='#FFD700';X.textAlign='right';
  X.fillText(`${score}`,700,34);
  X.font='14px sans-serif';X.fillStyle='#DDD';
  X.fillText(`${Math.floor(dst)}m`,700,55);

  // 시간
  const rem=Math.max(0,Math.ceil(GAME_SEC-elp));
  X.font='bold 24px sans-serif';X.fillStyle=rem<=10?'#F44336':'#FFF';X.textAlign='center';
  X.fillText(`${rem}`,360,38);
  X.font='12px sans-serif';X.fillStyle='#AAA';X.fillText('초',385,38);

  // 콤보
  if(cmb>=3){X.font='bold 16px sans-serif';X.fillStyle='#FFD700';X.textAlign='left';X.fillText(`콤보 x${cmb}`,20,75);}
  X.font='14px sans-serif';X.fillStyle='#FFB74D';X.textAlign='left';X.fillText(`🍞 ${items}`,20,95);

  // 부스터 게이지
  const now=performance.now();
  if(now<bstU){
    const r=(bstU-now)/BOOST_DUR;
    X.fillStyle='rgba(255,215,0,0.25)';X.fillRect(340,55,180,14);
    X.fillStyle='#FFD700';X.fillRect(340,55,180*r,14);
    X.fillStyle='rgba(255,255,255,0.2)';X.fillRect(340,55,180*r,6);
    X.font='bold 11px sans-serif';X.fillStyle='#FFD700';X.textAlign='center';
    X.fillText('⚡ BOOST!',430,66);
  }
}

// ── 메뉴 ────────────────────────────
function drawMenu(){
  const gr=X.createLinearGradient(0,0,0,1280);gr.addColorStop(0,'#64B5F6');gr.addColorStop(.35,'#C8E6C9');gr.addColorStop(1,'#388E3C');
  X.fillStyle=gr;X.fillRect(0,0,720,1280);
  drawBG(false);

  X.font='bold 58px sans-serif';X.fillStyle='#5D4037';X.strokeStyle='#FFF';X.lineWidth=5;X.textAlign='center';
  X.strokeText('🦁 신라이언',360,260);X.fillText('🦁 신라이언',360,260);
  X.font='bold 50px sans-serif';X.strokeText('러닝 게임',360,330);X.fillText('러닝 게임',360,330);

  X.save();X.translate(360,530);X.scale(2.8,2.8);drawBody(false,false,'win');X.restore();

  const pulse=Math.sin(performance.now()/400)*4;
  X.fillStyle='#E8B866';X.strokeStyle='#8B6914';X.lineWidth=4;
  X.beginPath();X.roundRect(220,790+pulse,280,75,22);X.fill();X.stroke();
  X.font='bold 32px sans-serif';X.fillStyle='#5D4037';X.textAlign='center';X.fillText('▶ 시작',360,838+pulse);

  X.font='15px sans-serif';X.fillStyle='#5D4037';
  X.fillText('← → 키 / 화면 좌우 탭 / 스와이프',360,920);
  X.font='13px sans-serif';X.fillStyle='#666';
  X.fillText('⚠ 바위를 피하고 🍞 빵을 먹어 120초 생존!',360,955);
}

// ── 결과 ────────────────────────────
function drawEnd(){
  X.fillStyle='rgba(0,0,0,0.65)';X.fillRect(0,0,720,1280);

  // 캐릭터 연출
  X.save();X.translate(360,400);X.scale(2.5,2.5);
  if(state==='victory'){
    // 점프 애니메이션
    const jump=Math.abs(Math.sin(performance.now()/300))*15;
    X.translate(0,-jump);
    drawBody(false,false,'win');
  }else{
    // 주저앉기
    X.translate(0,10);X.scale(1.1,0.85);
    drawBody(false,false,'hurt');
    // 눈물
    X.fillStyle='#64B5F6';
    X.fillRect(-12,-18,3,8);X.fillRect(10,-18,3,8);
  }
  X.restore();

  X.textAlign='center';
  if(state==='victory'){
    X.font='bold 48px sans-serif';X.fillStyle='#FFD700';X.fillText('🎉 클리어! 🎉',360,200);
    X.font='18px sans-serif';X.fillStyle='#FFF';X.fillText(WIN_MSG[Math.floor(elp)%WIN_MSG.length],360,250);
  }else{
    X.font='bold 48px sans-serif';X.fillStyle='#F44336';X.fillText('💔 게임 오버',360,200);
    X.font='18px sans-serif';X.fillStyle='#FFF';X.fillText(LOSE_MSG[Math.floor(elp)%LOSE_MSG.length],360,250);
  }

  X.font='18px sans-serif';X.fillStyle='#CCC';
  [`점수: ${score}`,`거리: ${Math.floor(dst)}m`,`생존: ${Math.floor(elp)}초`,`빵: ${items}개`,`최대콤보: ${maxCmb}`].forEach((s,i)=>X.fillText(s,360,560+i*32));

  const pulse=Math.sin(performance.now()/400)*3;
  X.fillStyle='#E8B866';X.strokeStyle='#8B6914';X.lineWidth=3;
  X.beginPath();X.roundRect(240,730+pulse,240,60,16);X.fill();X.stroke();
  X.font='bold 26px sans-serif';X.fillStyle='#5D4037';X.fillText('다시 도전',360,768+pulse);
}

// ── 메인 루프 ───────────────────────
function loop(t){
  const dt=Math.min((t-lt)/1000,.05);lt=t;
  if(state==='menu')drawMenu();
  else if(state==='playing'){update(dt);draw();}
  else{draw();drawEnd();}
  requestAnimationFrame(loop);
}
lt=performance.now();requestAnimationFrame(loop);
</script>
</body>
</html>
