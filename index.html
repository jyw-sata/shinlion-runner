<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>신라이언 러닝 게임</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#87CEEB;touch-action:none}
canvas{display:block;margin:0 auto}
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
// ============================================================
// 신라이언 러닝 게임 v2.0 — 대각선 트랙 리워크
// ============================================================
const C = document.getElementById('game');
const X = C.getContext('2d');

function resize(){
  const r=720/1280;let w=window.innerWidth,h=window.innerHeight;
  if(w/h>r){w=h*r}else{h=w/r}
  C.width=720;C.height=1280;C.style.width=w+'px';C.style.height=h+'px';
}
resize(); window.addEventListener('resize',resize);

// ============================================================
// 상수
// ============================================================
const LANES = 5;
const GAME_TIME = 120;
const TRAP_DMG = 10;
const BREAD_HEAL = 5;
const INVINCE_MS = 1000;
const BOOST_DUR = 4000;
const BOOST_INTERVAL = 20000;
const BOOST_SPEED = 1.6;

// 대각선 트랙 — 소실점이 오른쪽 위 (더 강한 대각선)
const VP_X = 650; // 소실점 X (더 오른쪽)
const VP_Y = 200; // 소실점 Y (더 위)
const BASE_X = 70;  // 트랙 시작 X (더 왼쪽)
const BASE_Y = 1100; // 트랙 시작 Y (더 아래)
const TRACK_W_NEAR = 420; // 가까운 쪽 트랙 폭
const TRACK_W_FAR = 60; // 먼 쪽 트랙 폭

// 난이도
function getDiff(t){
  if(t<20) return {spd:1.0, trap:0.018, item:0.010};
  if(t<50) return {spd:1.15, trap:0.025, item:0.008};
  if(t<80) return {spd:1.3, trap:0.032, item:0.006};
  return {spd:1.45, trap:0.038, item:0.005};
}

// ============================================================
// 상태
// ============================================================
let st='menu', energy=100, score=0, dist=0, elapsed=0;
let combo=0, maxCombo=0, items=0;
let curLane=2, tgtLane=2, laneSmooth=2;
let invUntil=0, boostUntil=0, lastBoost=0;
let spdMul=1, shake=0;
let obs=[], parts=[], trackOff=0, lt=0;
let comboTxt='', comboTimer=0;
let fallState=null; // {timer, phase} 추락 연출

const winMsg=["끝까지 포기하지 않으면 반드시 도착할 수 있어!","꾸준히 나아가면 결국 목표에 닿는다!","한 걸음씩, 멈추지 않는 것이 가장 빠른 길!"];
const loseMsg=["조금 쉬어가도 괜찮아, 다시 도전해보자!","이번엔 여기까지, 다음엔 더 멀리 갈 수 있어!","실패는 끝이 아니라 과정이야!","다시 달리면 더 강해질 수 있어!"];

// ============================================================
// 좌표 변환 (대각선 원근)
// ============================================================
function toScreen(lane, depth){
  const t = Math.max(0, Math.min(1, depth));
  // 보간: 가까이(0) → 멀리(1)
  const cx = BASE_X + (VP_X - BASE_X) * t;
  const cy = BASE_Y + (VP_Y - BASE_Y) * t;
  const tw = TRACK_W_NEAR + (TRACK_W_FAR - TRACK_W_NEAR) * t;
  // 레인 오프셋 (트랙 수직 방향)
  const angle = Math.atan2(VP_Y - BASE_Y, VP_X - BASE_X);
  const perpAngle = angle + Math.PI / 2;
  const laneOffset = (lane - 2) / 2 * tw * 0.4;
  const x = cx + Math.cos(perpAngle) * laneOffset;
  const y = cy + Math.sin(perpAngle) * laneOffset;
  const scale = 1 - t * 0.8;
  return {x, y, scale, tw};
}

// ============================================================
// 입력
// ============================================================
let touchX=0;
document.addEventListener('keydown', e=>{
  if(st==='menu'){startGame();return}
  if(st==='gameover'||st==='victory'){if(e.key===' '||e.key==='Enter')st='menu';return}
  if(e.key==='ArrowLeft'||e.key==='a')moveLane(-1);
  if(e.key==='ArrowRight'||e.key==='d')moveLane(1);
});
C.addEventListener('touchstart',e=>{e.preventDefault();if(st==='menu'){startGame();return}if(st!=='playing'){st='menu';return}touchX=e.touches[0].clientX;});
C.addEventListener('touchend',e=>{e.preventDefault();if(st!=='playing')return;const dx=e.changedTouches[0].clientX-touchX;if(Math.abs(dx)>25)moveLane(dx>0?1:-1);});
C.addEventListener('mousedown',e=>{if(st==='menu'){startGame();return}if(st!=='playing'){st='menu';return}const r=C.getBoundingClientRect();const x=(e.clientX-r.left)/r.width*720;if(x<360)moveLane(-1);else moveLane(1);});
function moveLane(d){tgtLane=Math.max(0,Math.min(LANES-1,tgtLane+d));}

// ============================================================
// 게임 시작
// ============================================================
function startGame(){
  st='playing';energy=100;score=0;dist=0;elapsed=0;
  combo=0;maxCombo=0;items=0;curLane=2;tgtLane=2;laneSmooth=2;
  invUntil=0;boostUntil=0;lastBoost=0;spdMul=1;shake=0;
  obs=[];parts=[];fallState=null;lt=performance.now();
}

// ============================================================
// 장애물 생성 (간격 보장)
// ============================================================
let lastTrapDepth = 2;
let lastItemDepth = 2;

function spawn(type){
  // 최소 간격 보장
  const minGap = type==='trap' ? 0.15 : 0.1;
  const lastDepth = type==='trap' ? lastTrapDepth : lastItemDepth;

  // 기존 같은 타입 중 가장 가까운 것과의 거리 체크
  const nearby = obs.filter(o=>o.type===type && o.depth > 0.8);
  if(nearby.length >= (type==='trap' ? 2 : 1)) return; // 동시에 너무 많으면 스킵

  let lane;
  const usedByTraps = obs.filter(o=>o.type==='trap' && o.depth > 0.85).map(o=>o.lane);

  // 회피 가능한 레인 선택
  let attempts = 0;
  do {
    lane = Math.floor(Math.random() * LANES);
    attempts++;
  } while(type==='trap' && usedByTraps.includes(lane) && attempts < 10);

  // 함정이 4레인 이상 차지하면 생성 안 함
  if(type==='trap' && usedByTraps.length >= 3) return;

  const sparkle = type==='item' && Math.random() < 0.12;
  obs.push({type, lane, depth:1.15, sparkle, hit:false});
  if(type==='trap') lastTrapDepth=1.15;
  else lastItemDepth=1.15;
}

// ============================================================
// 파티클
// ============================================================
function addPart(x,y,color,n=5){
  for(let i=0;i<n;i++){
    parts.push({x,y,vx:(Math.random()-0.5)*8,vy:-Math.random()*5-2,life:1,color,size:3+Math.random()*5});
  }
}

// ============================================================
// 추락 연출
// ============================================================
function startFall(){
  fallState = {timer: 0, phase: 'falling', totalTime: 1.5};
  shake = 12;
}

// ============================================================
// 업데이트
// ============================================================
function update(dt){
  if(st!=='playing') return;
  const now = performance.now();

  // 추락 중이면 추락 처리만
  if(fallState){
    fallState.timer += dt;
    if(fallState.phase === 'falling' && fallState.timer > 0.3){
      fallState.phase = 'recovering';
    }
    if(fallState.timer > fallState.totalTime){
      fallState = null;
    }
    shake *= 0.92;
    return;
  }

  elapsed += dt;
  const diff = getDiff(elapsed);

  // 부스터
  if(now < boostUntil){
    spdMul = BOOST_SPEED;
  } else {
    spdMul = diff.spd;
    if(now - lastBoost > BOOST_INTERVAL && elapsed > 8){
      activateBoost(now);
    }
  }

  const spd = 3 * spdMul;

  // 레인 부드럽게
  laneSmooth += (tgtLane - laneSmooth) * 0.12;

  dist += spd * dt * 10;
  score += Math.floor(spd * dt * 5);
  trackOff = (trackOff + spd * dt * 50) % 200;

  // 생성 (확률 기반, 하지만 간격 보장됨)
  if(Math.random() < diff.trap) spawn('trap');
  if(Math.random() < diff.item) spawn('item');

  // 장애물 이동 & 충돌
  for(let i=obs.length-1;i>=0;i--){
    const o=obs[i];
    o.depth -= spd * dt * 0.011;

    if(o.depth < 0.08 && o.depth > -0.02 && !o.hit){
      const ld = Math.abs(o.lane - Math.round(laneSmooth));
      if(ld < 0.6){
        o.hit = true;
        const p = toScreen(o.lane, Math.max(0,o.depth));

        if(o.type==='trap'){
          if(now > invUntil){
            energy = Math.max(0, energy - TRAP_DMG);
            invUntil = now + INVINCE_MS;
            combo = 0;
            addPart(p.x, p.y, '#FF4444', 10);
            startFall();
            if(energy <= 0){st='gameover';return;}
          }
        } else {
          energy = Math.min(100, energy + BREAD_HEAL);
          items++;
          combo++;
          if(combo > maxCombo) maxCombo = combo;
          score += 50 * combo;

          if(o.sparkle){
            activateBoost(now);
            addPart(p.x, p.y, '#FFD700', 15);
          } else {
            addPart(p.x, p.y, '#FF9800', 8);
          }

          if(combo>=20){comboTxt='🔥 AWESOME!';comboTimer=1.5;}
          else if(combo>=10){comboTxt='⭐ GREAT!';comboTimer=1.2;}
          else if(combo>=5){comboTxt='👍 NICE!';comboTimer=1.0;}
        }
      }
    }

    if(o.depth < -0.15){
      if(o.type==='trap' && !o.hit){combo++;score+=10;}
      obs.splice(i,1);
    }
  }

  // 파티클
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.2; p.life-=dt*2.5;
    if(p.life<=0)parts.splice(i,1);
  }

  shake *= 0.9;
  if(shake<0.1) shake=0;
  if(comboTimer>0) comboTimer-=dt;
  if(elapsed>=GAME_TIME) st='victory';
}

function activateBoost(now){
  boostUntil=now+BOOST_DUR; lastBoost=now;
  addPart(360,700,'#FFD700',20);
}

// ============================================================
// 그리기
// ============================================================
function draw(){
  const now=performance.now();
  const boost=now<boostUntil;
  const inv=now<invUntil;

  X.save();
  if(shake>0) X.translate((Math.random()-0.5)*shake*2,(Math.random()-0.5)*shake*2);

  // 하늘 (넓게)
  const sky=X.createLinearGradient(0,0,0,VP_Y+100);
  sky.addColorStop(0, boost?'#FF8F00':'#64B5F6');
  sky.addColorStop(0.7, boost?'#FFE082':'#BBDEFB');
  sky.addColorStop(1, boost?'#FFCC80':'#E8F5E9');
  X.fillStyle=sky;
  X.fillRect(0,0,720,VP_Y+100);

  // 잔디 (선명한 초록)
  const grass=X.createLinearGradient(0,VP_Y+50,0,1280);
  grass.addColorStop(0,'#43A047');
  grass.addColorStop(0.3,'#388E3C');
  grass.addColorStop(1,'#2E7D32');
  X.fillStyle=grass;
  X.fillRect(0,VP_Y+50,720,1280-VP_Y-50);

  drawBackground(boost);
  drawTrack(boost);

  // 장애물 (뒤→앞)
  const sorted=[...obs].sort((a,b)=>b.depth-a.depth);
  for(const o of sorted){
    if(o.depth<-0.05||o.depth>1.1) continue;
    drawObs(o);
  }

  // 캐릭터
  if(!fallState || fallState.phase !== 'falling'){
    drawChar(boost, inv);
  } else {
    // 추락 중 캐릭터 작아지며 떨어짐
    const ft = fallState.timer / 0.3;
    X.save();
    const p=toScreen(laneSmooth, 0.05);
    X.translate(p.x, p.y + ft * 60);
    X.scale(1-ft*0.5, 1-ft*0.5);
    X.globalAlpha = 1 - ft;
    drawCharBody(false,false);
    X.restore();
  }

  // 부스터 속도선
  if(boost) drawSpeedLines();

  // 파티클
  for(const p of parts){
    X.globalAlpha=p.life;
    X.fillStyle=p.color;
    X.beginPath();X.arc(p.x,p.y,p.size,0,Math.PI*2);X.fill();
  }
  X.globalAlpha=1;

  X.restore();

  drawUI();

  if(comboTimer>0){
    X.save();X.globalAlpha=Math.min(1,comboTimer);
    X.font='bold 52px sans-serif';X.fillStyle='#FFD700';X.strokeStyle='#5D4037';X.lineWidth=4;
    X.textAlign='center';X.strokeText(comboTxt,360,480);X.fillText(comboTxt,360,480);
    X.restore();
  }
}

// ============================================================
// 배경
// ============================================================
function drawBackground(boost){
  // === 뒤쪽 산/언덕 ===
  X.fillStyle='#81C784';
  X.beginPath();
  X.moveTo(0,VP_Y+30);
  X.quadraticCurveTo(150,VP_Y-40,300,VP_Y+20);
  X.quadraticCurveTo(500,VP_Y-20,720,VP_Y+40);
  X.lineTo(720,VP_Y+100);X.lineTo(0,VP_Y+100);
  X.fill();

  // === 빵집 건물 (왼쪽 뒤) ===
  // 건물 본체
  X.fillStyle='#FFCC80';
  X.fillRect(20,VP_Y-30,80,70);
  // 지붕
  X.fillStyle='#8D6E63';
  X.beginPath();X.moveTo(10,VP_Y-30);X.lineTo(60,VP_Y-70);X.lineTo(110,VP_Y-30);X.fill();
  // 창문
  X.fillStyle='#FFF9C4';
  X.fillRect(35,VP_Y-15,20,18);
  X.fillRect(65,VP_Y-15,20,18);
  // 간판
  X.fillStyle='#5D4037';
  X.fillRect(30,VP_Y+15,60,20);
  X.font='bold 10px sans-serif';X.fillStyle='#FFF';X.textAlign='center';
  X.fillText('🍞 빵집',60,VP_Y+30);
  // 문
  X.fillStyle='#6D4C41';
  X.fillRect(50,VP_Y+20,20,20);

  // === 집/마을 건물 (오른쪽 뒤) ===
  X.fillStyle='#E0E0E0';
  X.fillRect(620,VP_Y-10,70,50);
  X.fillStyle='#78909C';
  X.beginPath();X.moveTo(615,VP_Y-10);X.lineTo(655,VP_Y-45);X.lineTo(695,VP_Y-10);X.fill();
  X.fillStyle='#BBDEFB';
  X.fillRect(635,VP_Y,15,15);
  X.fillRect(660,VP_Y,15,15);

  // === 벚꽃 나무 (트랙 양쪽, 원근감) ===
  const trees=[
    {x:15,y:VP_Y+60,s:0.5},
    {x:700,y:VP_Y+40,s:0.45},
    {x:5,y:VP_Y+180,s:0.8},
    {x:710,y:VP_Y+150,s:0.7},
    {x:-5,y:VP_Y+350,s:1.1},
    {x:720,y:VP_Y+320,s:1.0},
    {x:-15,y:VP_Y+520,s:1.4},
    {x:730,y:VP_Y+490,s:1.3},
  ];
  for(const t of trees){
    // 줄기
    X.fillStyle='#5D4037';
    X.fillRect(t.x-4*t.s,t.y,8*t.s,40*t.s);
    // 벚꽃 (분홍)
    X.fillStyle='#F48FB1';
    X.beginPath();X.arc(t.x,t.y-15*t.s,22*t.s,0,Math.PI*2);X.fill();
    X.fillStyle='#F8BBD0';
    X.beginPath();X.arc(t.x-10*t.s,t.y-5*t.s,15*t.s,0,Math.PI*2);X.fill();
    X.beginPath();X.arc(t.x+10*t.s,t.y-5*t.s,15*t.s,0,Math.PI*2);X.fill();
    // 꽃잎 디테일
    X.fillStyle='#FCE4EC';
    X.beginPath();X.arc(t.x-5*t.s,t.y-18*t.s,6*t.s,0,Math.PI*2);X.fill();
    X.beginPath();X.arc(t.x+7*t.s,t.y-12*t.s,5*t.s,0,Math.PI*2);X.fill();
  }

  // === 떨어지는 꽃잎 (애니메이션) ===
  const now = performance.now() / 1000;
  X.fillStyle='rgba(248,187,208,0.5)';
  for(let i=0;i<8;i++){
    const px = (i*97 + now*20) % 720;
    const py = (i*131 + now*30 + Math.sin(now*2+i)*20) % 600 + VP_Y;
    X.beginPath();X.ellipse(px,py,3,2,now+i,0,Math.PI*2);X.fill();
  }

  // === 앞쪽 잔디 언덕 ===
  X.fillStyle='#66BB6A';
  X.beginPath();
  X.moveTo(0,VP_Y+100);
  X.quadraticCurveTo(180,VP_Y+60,360,VP_Y+90);
  X.quadraticCurveTo(540,VP_Y+50,720,VP_Y+100);
  X.lineTo(720,VP_Y+140);X.lineTo(0,VP_Y+140);
  X.fill();
}

// ============================================================
// 대각선 트랙
// ============================================================
function drawTrack(boost){
  const steps=50;
  for(let i=0;i<steps;i++){
    const d1=i/steps, d2=(i+1)/steps;

    // 트랙 중앙선 좌표
    const x1=BASE_X+(VP_X-BASE_X)*d1, y1=BASE_Y+(VP_Y-BASE_Y)*d1;
    const x2=BASE_X+(VP_X-BASE_X)*d2, y2=BASE_Y+(VP_Y-BASE_Y)*d2;
    const w1=(TRACK_W_NEAR+(TRACK_W_FAR-TRACK_W_NEAR)*d1)*0.5;
    const w2=(TRACK_W_NEAR+(TRACK_W_FAR-TRACK_W_NEAR)*d2)*0.5;

    // 트랙에 수직인 방향
    const angle=Math.atan2(VP_Y-BASE_Y, VP_X-BASE_X);
    const px=Math.cos(angle+Math.PI/2), py=Math.sin(angle+Math.PI/2);

    X.fillStyle=boost?'#A0722A':'#8B7355';
    X.beginPath();
    X.moveTo(x1-px*w1, y1-py*w1);
    X.lineTo(x2-px*w2, y2-py*w2);
    X.lineTo(x2+px*w2, y2+py*w2);
    X.lineTo(x1+px*w1, y1+py*w1);
    X.fill();

    // 레인 구분선
    if(i%3===0){
      X.strokeStyle='rgba(255,255,255,0.12)';
      X.lineWidth=1-d1*0.8;
      for(let l=1;l<LANES;l++){
        const off=(l-2)/2*0.8;
        X.beginPath();
        X.moveTo(x1+px*w1*off, y1+py*w1*off);
        X.lineTo(x2+px*w2*off, y2+py*w2*off);
        X.stroke();
      }
    }
  }

  // 트랙 테두리
  const angle=Math.atan2(VP_Y-BASE_Y, VP_X-BASE_X);
  const px=Math.cos(angle+Math.PI/2), py=Math.sin(angle+Math.PI/2);
  X.strokeStyle='#5D4037';X.lineWidth=3;
  X.beginPath();
  X.moveTo(BASE_X-px*TRACK_W_NEAR*0.5, BASE_Y-py*TRACK_W_NEAR*0.5);
  X.lineTo(VP_X-px*TRACK_W_FAR*0.5, VP_Y-py*TRACK_W_FAR*0.5);
  X.stroke();
  X.beginPath();
  X.moveTo(BASE_X+px*TRACK_W_NEAR*0.5, BASE_Y+py*TRACK_W_NEAR*0.5);
  X.lineTo(VP_X+px*TRACK_W_FAR*0.5, VP_Y+py*TRACK_W_FAR*0.5);
  X.stroke();
}

// ============================================================
// 장애물 그리기 (확실히 구분!)
// ============================================================
function drawObs(o){
  const p=toScreen(o.lane, o.depth);
  const s=p.scale*1.3;
  if(s<0.05) return;
  X.save();X.translate(p.x,p.y);X.scale(s,s);

  if(o.type==='trap'){
    // === 함정: 빨간 바위 + 경고 ===
    // 그림자
    X.fillStyle='rgba(0,0,0,0.2)';
    X.beginPath();X.ellipse(0,5,28,8,0,0,Math.PI*2);X.fill();
    // 바위
    X.fillStyle='#666';
    X.beginPath();X.moveTo(-20,5);X.lineTo(-12,-22);X.lineTo(0,5);X.fill();
    X.fillStyle='#888';
    X.beginPath();X.moveTo(-5,5);X.lineTo(8,-18);X.lineTo(18,5);X.fill();
    X.fillStyle='#555';
    X.beginPath();X.moveTo(5,5);X.lineTo(0,-28);X.lineTo(-8,5);X.fill();
    // 빨간 경고 글로우
    X.fillStyle='rgba(255,0,0,0.2)';
    X.beginPath();X.arc(0,-5,30,0,Math.PI*2);X.fill();
    // ⚠ 마크
    X.fillStyle='#FF3333';
    X.font='bold 24px sans-serif';X.textAlign='center';
    X.fillText('⚠',0,-32);
  } else {
    // === 빵: 따뜻한 색 + 반짝임 ===
    if(o.sparkle){
      // ⭐ 빤짝이 빵 — 금색 발광
      const t=performance.now()/300;
      const glow=X.createRadialGradient(0,-8,5,0,-8,35);
      glow.addColorStop(0,'rgba(255,215,0,0.5)');
      glow.addColorStop(1,'rgba(255,215,0,0)');
      X.fillStyle=glow;
      X.beginPath();X.arc(0,-8,35,0,Math.PI*2);X.fill();
      // 회전하는 별
      X.save();X.rotate(t);
      X.font='36px sans-serif';X.textAlign='center';X.textBaseline='middle';
      X.fillText('⭐',0,-8);
      X.restore();
    } else {
      // 일반 빵 — 크고 밝은 갈색
      // 그림자
      X.fillStyle='rgba(0,0,0,0.15)';
      X.beginPath();X.ellipse(0,8,22,6,0,0,Math.PI*2);X.fill();
      // 빵 몸체 (큰 타원)
      X.fillStyle='#D4A054';
      X.beginPath();X.ellipse(0,-2,22,16,0,0,Math.PI*2);X.fill();
      // 빵 윗면 (밝은)
      X.fillStyle='#EDBE76';
      X.beginPath();X.ellipse(0,-6,18,12,0,0,Math.PI*2);X.fill();
      // 빵 하이라이트
      X.fillStyle='#F5D89A';
      X.beginPath();X.ellipse(-4,-10,8,6,0,0,Math.PI*2);X.fill();
      // 크로와상 줄
      X.strokeStyle='#C49040';X.lineWidth=1.5;
      X.beginPath();X.moveTo(-10,-4);X.quadraticCurveTo(0,-12,10,-4);X.stroke();
      X.beginPath();X.moveTo(-6,-1);X.quadraticCurveTo(0,-8,6,-1);X.stroke();
      // 🍞 라벨
      X.fillStyle='#FF9800';
      X.font='bold 12px sans-serif';X.textAlign='center';
      X.fillText('+5',0,20);
    }
  }
  X.restore();
}

// ============================================================
// 캐릭터
// ============================================================
function drawChar(boost,inv){
  const now=performance.now();
  if(inv && Math.floor(now/80)%3===0) return; // 무적 깜빡임

  // 추락 복귀 중이면 위에서 떨어지는 연출
  if(fallState && fallState.phase==='recovering'){
    const rt = (fallState.timer - 0.3) / (fallState.totalTime - 0.3);
    const p=toScreen(laneSmooth, 0.05);
    X.save();
    X.translate(p.x, p.y - 80 * (1 - rt));
    X.globalAlpha = rt;
    const bounceS = 0.5 + rt * 0.5;
    X.scale(bounceS, bounceS);
    drawCharBody(boost, false);
    X.restore();
    return;
  }

  const p=toScreen(laneSmooth, 0.05);
  X.save();
  X.translate(p.x, p.y - 30);
  const tilt=(tgtLane-laneSmooth)*0.12;
  X.rotate(tilt);
  drawCharBody(boost, true);
  X.restore();
}

function drawCharBody(boost, animated){
  const now=performance.now();
  const run=animated?Math.sin(now/100)*8:0;
  const arm=animated?Math.sin(now/100)*15:0;

  // 그림자
  X.fillStyle='rgba(0,0,0,0.15)';
  X.beginPath();X.ellipse(0,40,25,8,0,0,Math.PI*2);X.fill();

  // 다리
  X.fillStyle='#C49040';
  X.fillRect(-12,20+run,10,20);
  X.fillRect(2,20-run,10,20);

  // 몸통
  X.fillStyle='#E8B866';
  X.beginPath();X.ellipse(0,5,28,25,0,0,Math.PI*2);X.fill();
  // 배
  X.fillStyle='#F5DEB3';
  X.beginPath();X.ellipse(0,10,18,16,0,0,Math.PI*2);X.fill();

  // 팔
  X.fillStyle='#D4A054';
  if(boost){
    X.fillRect(-32,0,14,8);X.fillRect(18,0,14,8);
  } else {
    X.save();X.translate(-25,0);X.rotate(arm*Math.PI/180);X.fillRect(0,-4,10,16);X.restore();
    X.save();X.translate(15,0);X.rotate(-arm*Math.PI/180);X.fillRect(0,-4,10,16);X.restore();
  }

  // 머리
  X.fillStyle='#E8B866';
  X.beginPath();X.arc(0,-22,22,0,Math.PI*2);X.fill();
  // 갈기
  X.fillStyle='#D4A054';
  X.beginPath();X.arc(0,-24,26,Math.PI*0.8,Math.PI*2.2);X.fill();
  // 귀
  X.fillStyle='#D4A054';
  X.beginPath();X.arc(-16,-38,8,0,Math.PI*2);X.fill();
  X.beginPath();X.arc(16,-38,8,0,Math.PI*2);X.fill();
  X.fillStyle='#FFB7C5';
  X.beginPath();X.arc(-16,-38,4,0,Math.PI*2);X.fill();
  X.beginPath();X.arc(16,-38,4,0,Math.PI*2);X.fill();
  // 눈
  X.fillStyle='#333';
  X.beginPath();X.arc(-8,-24,4,0,Math.PI*2);X.fill();
  X.beginPath();X.arc(8,-24,4,0,Math.PI*2);X.fill();
  X.fillStyle='#FFF';
  X.beginPath();X.arc(-6,-26,2,0,Math.PI*2);X.fill();
  X.beginPath();X.arc(10,-26,2,0,Math.PI*2);X.fill();
  // 코
  X.fillStyle='#333';
  X.beginPath();X.ellipse(0,-18,4,3,0,0,Math.PI*2);X.fill();
  // 입
  X.strokeStyle='#333';X.lineWidth=2;
  X.beginPath();
  if(boost){X.arc(0,-14,6,0,Math.PI);}else{X.arc(0,-16,4,0.1,Math.PI-0.1);}
  X.stroke();
  // 볼
  X.fillStyle='rgba(255,150,150,0.4)';
  X.beginPath();X.arc(-14,-18,5,0,Math.PI*2);X.fill();
  X.beginPath();X.arc(14,-18,5,0,Math.PI*2);X.fill();
}

// ============================================================
// 속도선
// ============================================================
function drawSpeedLines(){
  X.strokeStyle='rgba(255,200,0,0.25)';X.lineWidth=2;
  const angle=Math.atan2(VP_Y-BASE_Y,VP_X-BASE_X);
  for(let i=0;i<10;i++){
    const x=100+Math.random()*520;
    const y=300+Math.random()*700;
    X.beginPath();X.moveTo(x,y);
    X.lineTo(x-Math.cos(angle)*60,y-Math.sin(angle)*60);
    X.stroke();
  }
}

// ============================================================
// UI
// ============================================================
function drawUI(){
  if(st!=='playing')return;

  X.fillStyle='rgba(0,0,0,0.5)';X.fillRect(0,0,720,100);

  // 에너지바
  X.fillStyle='#333';X.fillRect(20,15,300,25);
  X.fillStyle=energy>50?'#4CAF50':energy>25?'#FF9800':'#F44336';
  X.fillRect(22,17,296*(energy/100),21);
  X.strokeStyle='#555';X.lineWidth=2;X.strokeRect(20,15,300,25);
  X.font='bold 14px sans-serif';X.fillStyle='#FFF';X.textAlign='center';
  X.fillText(`에너지 ${Math.ceil(energy)}%`,170,33);

  // 점수/거리
  X.font='bold 20px sans-serif';X.fillStyle='#FFD700';X.textAlign='right';
  X.fillText(`${score}점`,700,30);
  X.font='16px sans-serif';X.fillStyle='#FFF';
  X.fillText(`${Math.floor(dist)}m`,700,55);

  // 시간
  const rem=Math.max(0,Math.ceil(GAME_TIME-elapsed));
  X.font='bold 22px sans-serif';X.fillStyle=rem<=10?'#F44336':'#FFF';X.textAlign='center';
  X.fillText(`${rem}초`,360,35);

  // 콤보
  if(combo>=3){
    X.font='bold 16px sans-serif';X.fillStyle='#FFD700';X.textAlign='left';
    X.fillText(`콤보 x${combo}`,20,70);
  }
  X.font='14px sans-serif';X.fillStyle='#FFB74D';X.textAlign='left';
  X.fillText(`🍞 ${items}`,20,90);

  // 부스터 게이지
  const now=performance.now();
  if(now<boostUntil){
    const r=(boostUntil-now)/BOOST_DUR;
    X.fillStyle='rgba(255,215,0,0.3)';X.fillRect(340,50,180,12);
    X.fillStyle='#FFD700';X.fillRect(340,50,180*r,12);
    X.font='bold 11px sans-serif';X.fillStyle='#FFD700';X.textAlign='center';
    X.fillText('⚡ BOOST!',430,61);
  }
}

// ============================================================
// 메뉴/결과 화면
// ============================================================
function drawMenu(){
  const grad=X.createLinearGradient(0,0,720,1280);
  grad.addColorStop(0,'#87CEEB');grad.addColorStop(0.4,'#E8F5E9');grad.addColorStop(1,'#4CAF50');
  X.fillStyle=grad;X.fillRect(0,0,720,1280);

  drawBackground(false);

  X.font='bold 56px sans-serif';X.fillStyle='#5D4037';X.strokeStyle='#FFF';X.lineWidth=4;X.textAlign='center';
  X.strokeText('🦁 신라이언',360,280);X.fillText('🦁 신라이언',360,280);
  X.font='bold 48px sans-serif';
  X.strokeText('러닝 게임',360,350);X.fillText('러닝 게임',360,350);

  X.save();X.translate(360,560);X.scale(2.5,2.5);
  drawCharBody(false,false);X.restore();

  const pulse=Math.sin(performance.now()/400)*3;
  X.fillStyle='#E8B866';X.strokeStyle='#8B6914';X.lineWidth=4;
  X.beginPath();X.roundRect(240,800+pulse,240,70,20);X.fill();X.stroke();
  X.font='bold 30px sans-serif';X.fillStyle='#5D4037';X.textAlign='center';
  X.fillText('▶ 시작',360,845+pulse);

  X.font='16px sans-serif';X.fillStyle='#5D4037';
  X.fillText('좌우 스와이프 / 화면 탭',360,930);
  X.fillText('PC: ← → 키',360,955);
  X.font='14px sans-serif';X.fillStyle='#777';
  X.fillText('함정(바위⚠)을 피하고 빵(🍞)을 먹어 120초 생존!',360,995);
}

function drawEnd(){
  X.fillStyle='rgba(0,0,0,0.6)';X.fillRect(0,0,720,1280);
  X.textAlign='center';

  if(st==='victory'){
    X.font='bold 52px sans-serif';X.fillStyle='#FFD700';
    X.fillText('🎉 클리어! 🎉',360,300);
    X.font='20px sans-serif';X.fillStyle='#FFF';
    X.fillText(winMsg[Math.floor(elapsed)%winMsg.length],360,380);
  } else {
    X.font='bold 52px sans-serif';X.fillStyle='#F44336';
    X.fillText('💔 게임 오버',360,300);
    X.font='20px sans-serif';X.fillStyle='#FFF';
    X.fillText(loseMsg[Math.floor(elapsed)%loseMsg.length],360,380);
  }

  X.font='20px sans-serif';X.fillStyle='#CCC';
  [`점수: ${score}`,`거리: ${Math.floor(dist)}m`,`생존: ${Math.floor(elapsed)}초`,`빵: ${items}개`,`최대콤보: ${maxCombo}`].forEach((s,i)=>X.fillText(s,360,460+i*35));

  const pulse=Math.sin(performance.now()/400)*3;
  X.fillStyle='#E8B866';X.strokeStyle='#8B6914';X.lineWidth=3;
  X.beginPath();X.roundRect(240,700+pulse,240,60,16);X.fill();X.stroke();
  X.font='bold 26px sans-serif';X.fillStyle='#5D4037';
  X.fillText('다시 도전',360,738+pulse);
}

// ============================================================
// 메인 루프
// ============================================================
function loop(t){
  const dt=Math.min((t-lt)/1000,0.05);lt=t;
  if(st==='menu'){drawMenu();}
  else if(st==='playing'){update(dt);draw();}
  else{draw();drawEnd();}
  requestAnimationFrame(loop);
}
lt=performance.now();
requestAnimationFrame(loop);
</script>
